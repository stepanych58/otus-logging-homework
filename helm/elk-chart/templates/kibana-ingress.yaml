{{- if .Values.kibana.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.kibana.ingress.className }}
spec:
  ingressClassName: {{ .Values.kibana.ingress.className }}
  rules:
    - host: {{ .Values.kibana.ingress.host }}
      http:
        paths:
          - path: {{ .Values.kibana.ingress.path }}
            pathType: {{ .Values.kibana.ingress.pathType }}
            backend:
              service:
                name: kibana
                port:
                  number: 5601
  {{- end }}