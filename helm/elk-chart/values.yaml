namespace: logging

elasticsearch:
  image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
  replicas: 1
  storage: 1Gi
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

kibana:
  image: docker.elastic.co/kibana/kibana:8.12.0
  nodePort: 30001
  resources:
    requests:
      cpu: "500m"
      memory: "1280Mi"
    limits:
      cpu: "1500m"
      memory: "2560Mi"

  ingress:
    enabled: true
    className: nginx
    host: kibana.local
    path: /
    pathType: Prefix

fluentbit:
  image: fluent/fluent-bit:4.2.3.1-debug
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"