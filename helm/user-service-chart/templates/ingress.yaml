{{- if .Values.userServiceSwaggerIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "user-service-chart.fullname" . }}
  labels:
    {{- include "user-service-chart.labels" . | nindent 4 }}
  {{- with .Values.userServiceSwaggerIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ .Values.projectNamespace }}
spec:
  {{- with .Values.userServiceSwaggerIngress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.userServiceSwaggerIngress.tls }}
  tls:
    {{- range .Values.userServiceSwaggerIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.userServiceSwaggerIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "user-service-chart.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- end }}
---
  {{- if .Values.userServiceApiIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "user-service-chart.fullname" . }}-2
  labels:
    {{- include "user-service-chart.labels" . | nindent 4 }}
  {{- with .Values.userServiceApiIngress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ .Values.projectNamespace }}
spec:
  {{- with .Values.userServiceApiIngress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.userServiceApiIngress.tls }}
  tls:
    {{- range .Values.userServiceApiIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.userServiceApiIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- with .pathType }}
            pathType: {{ . }}
            {{- end }}
            backend:
              service:
                name: {{ include "user-service-chart.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- end }}
